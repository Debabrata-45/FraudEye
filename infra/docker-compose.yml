services:
  postgres:
    image: postgres:16-alpine
    container_name: fraudeye-postgres
    environment:
      POSTGRES_USER: fraudeye
      POSTGRES_PASSWORD: fraudeye_pass
      POSTGRES_DB: fraudeye_db
    ports:
      - "5433:5432"
    volumes:
      - fraudeye_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraudeye -d fraudeye_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: fraudeye-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fraudeye-backend
    env_file:
      - ../backend/.env.docker
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ml-service:
    build:
      context: ../ml-service
      dockerfile: Dockerfile
    container_name: fraudeye-ml-service
    env_file:
      - ../ml-service/.env.docker
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: ../backend/worker
      dockerfile: Dockerfile
    container_name: fraudeye-worker
    env_file:
      - ../backend/worker/.env.docker
    command: ["node", "src/index.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: fraudeye-frontend
    env_file:
      - ../frontend/.env.docker
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  fraudeye_pgdata: